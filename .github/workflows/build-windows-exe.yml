name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements-export.txt

      - name: Build one-file EXE
        shell: pwsh
        run: |
          ./build_windows.ps1 -OneFile -SkipDeps

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accounting-system-windows-exe
          path: dist/AccountingSystem.exe
          if-no-files-found: error

      - name: Publish release asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'build-' + github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: dist/AccountingSystem.exe
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}

          